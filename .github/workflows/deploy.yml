name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write    # required for OIDC -> AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      VITE_GUITARS_API_BASE_URL: ${{ vars.GUITARS_API_BASE_URL }}
      VITE_GUITARS_BEARER_TOKEN: ${{ secrets.GUITARS_BEARER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        env:
          BUCKET: ${{ vars.GUITARS_BUCKET }}
        run: aws s3 sync dist/ "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront
        env:
          DIST: ${{ vars.GUITARS_DISTRIBUTION_ID }}
        run: aws cloudfront create-invalidation --distribution-id "${DIST}" --paths "/*"
