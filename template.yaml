AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Static hosting for guitars-webapp: a public S3 bucket fronted by CloudFront
  at guitarcollection.brouwers.club. A CloudFront Function rewrites SPA routes
  to /index.html so deep links resolve on refresh.

Parameters:
  BucketName:
    Type: String
    Description: Globally unique name for the static-site bucket.
  SiteDomainName:
    Type: String
    Default: guitarcollection.brouwers.club
    Description: Custom domain served by CloudFront.
  HostedZoneId:
    Type: String
    Default: Z0268167UNCHL7FC13KG
    Description: Route53 hosted zone ID for the site domain.
  AcmCertificateArn:
    Type: String
    Description: >
      ACM certificate ARN for SiteDomainName in us-east-1 (required by
      CloudFront).

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, HEAD]
            AllowedOrigins:
              - https://guitarcollection.brouwers.club
              - http://localhost:5173
              - http://127.0.0.1:5173
            ExposedHeaders: [ETag]
            MaxAge: 3600

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${SiteBucket}/*'

  SpaRouterFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-spa-router'
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite SPA routes (no file extension) to /index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.indexOf('/images/') === 0) {
            return request;
          }
          if (uri.endsWith('/')) {
            request.uri = '/index.html';
          } else if (!uri.split('/').pop().includes('.')) {
            request.uri = '/index.html';
          }
          return request;
        }

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'guitars-webapp (${SiteDomainName})'
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases:
          - !Ref SiteDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: SiteBucketOrigin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: SiteBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRouterFunction.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  SiteDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref SiteDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  SiteDnsRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref SiteDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  BucketName:
    Description: Name of the public S3 bucket holding the built site.
    Value: !Ref SiteBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'
  DistributionId:
    Description: CloudFront distribution ID (use for cache invalidations).
    Value: !Ref SiteDistribution
    Export:
      Name: !Sub '${AWS::StackName}-DistributionId'
  DistributionDomain:
    Description: CloudFront distribution domain name.
    Value: !GetAtt SiteDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-DistributionDomain'
  SiteUrl:
    Description: Public URL for the guitars webapp.
    Value: !Sub 'https://${SiteDomainName}/'
  SiteDomainName:
    Description: Custom domain attached to CloudFront.
    Value: !Ref SiteDomainName
